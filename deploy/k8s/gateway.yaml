# Sample Kubernetes manifest for the ApiGateway (the single deployable host).
# This is a STARTING POINT — review resource sizing, replica count, secrets, and ingress for your cluster.
# Apply: kubectl apply -f deploy/k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allspice-gateway
  labels:
    app: allspice-gateway
spec:
  replicas: 2 # The migration runner serializes via a Postgres advisory lock, so multiple replicas are safe.
  selector:
    matchLabels:
      app: allspice-gateway
  template:
    metadata:
      labels:
        app: allspice-gateway
    spec:
      containers:
        - name: gateway
          image: allspice-gateway:latest # replace with your registry/repository:tag
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317 # remove if you don't run a collector
          # Connection strings, Keycloak, Redis, mail provider keys, blob storage — supply from a Secret.
          envFrom:
            - secretRef:
                name: allspice-gateway-secrets
          # Liveness: restart the pod if the process is hung.
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          # Readiness: only route traffic once DB connectivity + migrations are healthy.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 6 # allow time for startup migrations under contention
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: allspice-gateway
spec:
  selector:
    app: allspice-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
