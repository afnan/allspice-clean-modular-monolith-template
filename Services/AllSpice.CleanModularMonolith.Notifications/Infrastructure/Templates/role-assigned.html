<h2 style="margin:0 0 16px;color:#111827;font-size:20px;font-weight:600;">
  New role assigned
</h2>
<p style="margin:0 0 16px;color:#374151;font-size:15px;line-height:1.6;">
  Hi {{FirstName}},
</p>
<p style="margin:0 0 24px;color:#374151;font-size:15px;line-height:1.6;">
  You have been assigned the role <strong>{{RoleName}}</strong> in the <strong>{{ModuleName}}</strong> module.
</p>
<p style="margin:0 0 24px;color:#6b7280;font-size:14px;line-height:1.5;">
  This change is effective immediately. If you believe this was done in error, please contact your administrator.
</p>
<table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto;">
  <tr>
    <td style="background-color:#2563eb;border-radius:8px;">
      <a href="{{LoginUrl}}" target="_blank" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;">
        Go to {{ProjectName}}
      </a>
    </td>
  </tr>
</table>
