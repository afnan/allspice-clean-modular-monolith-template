<h2 style="margin:0 0 16px;color:#111827;font-size:20px;font-weight:600;">
  Welcome to {{ProjectName}}
</h2>
<p style="margin:0 0 16px;color:#374151;font-size:15px;line-height:1.6;">
  Hi {{FirstName}},
</p>
<p style="margin:0 0 24px;color:#374151;font-size:15px;line-height:1.6;">
  Your account has been created. You have been assigned the <strong>{{Role}}</strong> role.
</p>
<div style="background-color:#f3f4f6;border-radius:8px;padding:20px;margin:0 0 24px;">
  <p style="margin:0 0 8px;color:#6b7280;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Your Login Credentials</p>
  <p style="margin:0 0 4px;color:#111827;font-size:15px;"><strong>Email:</strong> {{Email}}</p>
  <p style="margin:0;color:#111827;font-size:15px;"><strong>Temporary Password:</strong> <code style="background-color:#e5e7eb;padding:2px 6px;border-radius:4px;font-size:14px;">{{TempPassword}}</code></p>
</div>
<p style="margin:0 0 24px;color:#6b7280;font-size:14px;line-height:1.5;">
  You will be asked to set a new password when you first log in.
</p>
<table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto;">
  <tr>
    <td style="background-color:#2563eb;border-radius:8px;">
      <a href="{{LoginUrl}}" target="_blank" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;">
        Log In
      </a>
    </td>
  </tr>
</table>
