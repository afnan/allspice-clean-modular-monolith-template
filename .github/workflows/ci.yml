name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AllSpice.CleanModularMonolith.slnx

      - name: Build
        run: dotnet build AllSpice.CleanModularMonolith.slnx --no-restore --configuration Release

      # Runs unit + integration (Testcontainers/Postgres works on GitHub-hosted runners) + the
      # architecture-fitness tests, and collects coverage.
      - name: Test
        run: >
          dotnet test AllSpice.CleanModularMonolith.slnx --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:'./TestResults/**/coverage.cobertura.xml' \
            -targetdir:./CoverageReport \
            -reporttypes:'Html;TextSummary;MarkdownSummaryGithub'
          cat ./CoverageReport/Summary.txt
          if [ -f ./CoverageReport/SummaryGithub.md ]; then
            cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./CoverageReport

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AllSpice.CleanModularMonolith.slnx

      # Fail the build on any KNOWN-vulnerable package (direct or transitive). Build-time NuGetAudit already
      # warns (and warnings are errors), but this catches advisories published after the last build too.
      - name: Audit vulnerable packages
        run: |
          # Write the report to a file instead of piping to tee: a pipe hides dotnet's real exit code, so a
          # restore/tooling failure (which prints no severity words) would pass this gate as a false negative.
          # Fail hard if the command itself errors.
          if ! dotnet list AllSpice.CleanModularMonolith.slnx package --vulnerable --include-transitive > vulnerable.txt 2>&1; then
            cat vulnerable.txt
            echo "::error::'dotnet list package --vulnerable' failed to run (restore/tooling error) — failing to avoid a false negative."
            exit 1
          fi
          cat vulnerable.txt
          if grep -q -E "Critical|High|Moderate|Low" vulnerable.txt; then
            echo "::error::Vulnerable NuGet packages detected. See the log above."
            exit 1
          fi
          # Backstop: require the explicit "no vulnerable packages" sentinel so a silently empty or garbled
          # report cannot be mistaken for a clean audit.
          if ! grep -q "no vulnerable packages" vulnerable.txt; then
            echo "::error::Audit output did not contain the expected 'no vulnerable packages' confirmation — treating as a failure."
            exit 1
          fi
